name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  read-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: tags
        run: echo "tags=$(jq -c 'keys' tags.json)" >> "$GITHUB_OUTPUT"

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy
      - name: Test
        run: pytest --cov=eidolon --cov-report=term-missing

  generate-configs:
    runs-on: ubuntu-latest
    needs: [lint-and-test, read-tags]
    outputs:
      cache-key: ${{ steps.date.outputs.key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get cache key
        id: date
        run: echo "key=nginx-configs-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
      - name: Restore config cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: configs/
          key: ${{ steps.date.outputs.key }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Install eidolon
        run: pip install .
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Generate all configs
        run: |
          for tag in $(jq -r 'keys[]' tags.json); do
            mkdir -p "configs/${tag}"
            eidolon --tag "${tag}" --output "configs/${tag}/nginx.conf"
          done

  docker-build:
    runs-on: ubuntu-latest
    needs: [generate-configs, read-tags]
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.read-tags.outputs.tags) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Restore config cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: configs/
          key: ${{ needs.generate-configs.outputs.cache-key }}
      - run: cp configs/${{ matrix.tag }}/nginx.conf .
      - name: Build Docker image
        run: docker build -t eidolon:${{ matrix.tag }} .

  docker-integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Docker integration tests
        run: pytest -m docker -v

  success:
    name: Success
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build, docker-integration]
    steps:
      - name: Success
        run: echo "CI completed successfully!"
