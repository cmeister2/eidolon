name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  read-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: tags
        run: echo "tags=$(jq -c 'keys' tags.json)" >> "$GITHUB_OUTPUT"

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/
      - name: Type check
        run: mypy
      - name: Test
        run: pytest --cov=eidolon --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, read-tags]
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.read-tags.outputs.tags) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
      - name: Install eidolon
        run: pip install .
      - name: Generate nginx config
        run: eidolon --tag ${{ matrix.tag }} --output nginx.conf
      - name: Build Docker image
        run: docker build -t eidolon:${{ matrix.tag }} .

  docker-integration:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run Docker integration tests
        run: pytest -m docker -v

  success:
    name: Success
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build, docker-integration]
    steps:
      - name: Success
        run: echo "CI completed successfully!"
