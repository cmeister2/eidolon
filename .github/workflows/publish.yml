name: Publish

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  read-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: tags
        run: echo "tags=$(jq -c 'keys' tags.json)" >> "$GITHUB_OUTPUT"

  generate-configs:
    runs-on: ubuntu-latest
    needs: read-tags
    outputs:
      cache-key: ${{ steps.date.outputs.key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Get cache key
        id: date
        run: echo "key=nginx-configs-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
      - name: Restore config cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: configs/
          key: ${{ steps.date.outputs.key }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Install eidolon
        run: pip install .
      - if: steps.cache.outputs.cache-hit != 'true'
        name: Generate all configs
        run: |
          for tag in $(jq -r 'keys[]' tags.json); do
            mkdir -p "configs/${tag}"
            eidolon --tag "${tag}" --output "configs/${tag}/nginx.conf"
          done

  publish:
    runs-on: ubuntu-latest
    needs: [generate-configs, read-tags]
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.read-tags.outputs.tags) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore config cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: configs/
          key: ${{ needs.generate-configs.outputs.cache-key }}

      - run: cp configs/${{ matrix.tag }}/nginx.conf .

      - name: Get date stamp
        id: date
        run: echo "stamp=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.tag }}
            ghcr.io/${{ github.repository }}:${{ matrix.tag }}-${{ steps.date.outputs.stamp }}
